site_name: InertiaBones
site_description: Deterministic PhysBone controller generation and crash-safe mesh baking for VRChat avatars
repo_url: https://github.com/fammerino/InertiaBones-docs

theme:
  name: material
  logo: assets/brand/logo.png
  favicon: assets/brand/favicon.png
  palette:
    - scheme: default
      primary: black
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: black
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/kzq_vr
    - icon: fontawesome/solid/cart-shopping
      link: https://a2x4.booth.pm/

nav:
  - Introduction: index.md
  - Quick Start: quick-start.md
  - Configuration: configuration.md
  - System Features: features.md
  - FAQ: faq.md
  - Known Issues: issues.md
  - Contact: contact.md
  - License: license.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences